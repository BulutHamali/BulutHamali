name: Update WakaTime Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCK_STYLE: "░▒▓█"
          SHOW_TIME: true
          TIME_RANGE: last_7_days
          SHOW_TOTAL_TIME: true
          LANG_COUNT: 8
